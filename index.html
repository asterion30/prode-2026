<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026</title>
    
    <!-- Security Headers (Grade A) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://flagcdn.com https://www.svgrepo.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://get.geojs.io; frame-ancestors 'none';">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- CSS (Processed by Vite/Tailwind) -->
    <link rel="stylesheet" href="./src/css/styles.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-dark text-white font-sans antialiased min-h-screen flex items-center justify-center">

    <!-- App Container -->
    <div id="app-container" class="w-full max-w-5xl md:h-[800px] flex flex-col md:flex-row relative shadow-2xl bg-brand-dark overflow-hidden sm:border sm:border-slate-800 sm:rounded-3xl sm:my-8 hide-scrollbar mx-auto">
        
        <!-- LOGIN VIEW -->
        <section id="login-view" class="flex-1 w-full flex flex-col justify-center items-center p-6 sm:p-10 z-10 transition-all duration-500 min-h-screen md:min-h-0">
            <div class="mb-8 text-center">
                <div class="w-24 h-24 bg-brand-500/10 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(34,197,94,0.3)] overflow-hidden p-1">
                    <img src="/assets/cup.webp" alt="Prode 2026" class="w-full h-full object-contain rounded-full drop-shadow-lg" />
                </div>
                <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">Prode 2026</h1>
                <p class="text-slate-400">Pronostica los resultados del Mundial</p>
            </div>

            <form id="login-form" class="w-full max-w-sm space-y-4">
                <div>
                    <label for="email-input" class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
                    <input type="email" id="email-input" required placeholder="ejemplo@vittal.com.ar" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all placeholder-slate-500 text-white">
                </div>

                <button type="submit" class="w-full mt-2 py-3 px-4 bg-brand-600 hover:bg-brand-500 text-white font-semibold rounded-xl shadow-lg transition-all active:scale-[0.98] flex justify-center items-center gap-2">
                    <span>Entrar / Registrarme</span>
                    <span>&rarr;</span>
                </button>
            </form>
            
            <div id="login-error" class="mt-4 text-red-400 text-sm hidden text-center max-w-sm"></div>
            <div id="login-success" class="mt-4 text-brand-500 text-sm hidden text-center max-w-sm"></div>
        </section>

        <!-- MAIN APP VIEW -->
        <section id="main-view" class="flex-1 flex flex-col md:flex-row hidden h-full w-full">
            
            <!-- Left Column: Matches & Ranking -->
            <div class="flex-1 flex flex-col relative h-full md:border-r border-slate-800">
                <header class="bg-brand-card/80 backdrop-blur-md border-b border-slate-800 p-4 flex justify-between items-center sticky top-0 z-50">
                    <div class="flex items-center gap-2">
                        <img id="logo-cup" src="/assets/cup.webp" alt="Copa" class="w-6 h-6 object-contain drop-shadow cursor-pointer" />
                        <h1 class="font-bold text-lg">Prode 2026</h1>
                        
                        <div class="flex items-center gap-1 sm:gap-2 ml-2 sm:ml-4">
                            <button id="nav-matches" class="nav-btn px-2 sm:px-3 py-1.5 rounded-lg text-brand-500 bg-brand-500/10 font-medium text-sm transition-colors border border-brand-500/20">Partidos</button>
                            <button id="nav-ranking" class="nav-btn px-2 sm:px-3 py-1.5 rounded-lg text-slate-400 font-medium text-sm transition-colors border border-transparent">Ranking</button>
                            <button id="nav-users" class="nav-btn hidden px-2 sm:px-3 py-1.5 rounded-lg text-slate-400 font-medium text-sm transition-colors border border-transparent">Usuarios</button>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 sm:gap-3">
                        <div class="text-right">
                            <p id="user-alias-display" class="text-sm font-semibold text-white">Alias</p>
                            <p id="user-points-display" class="text-xs text-brand-500 font-medium">0 pts</p>
                        </div>
                        <div class="hidden sm:flex w-10 h-10 rounded-full bg-slate-700 border-2 border-brand-500 overflow-hidden">
                            <img id="user-avatar-img" src="/assets/avatar.webp" alt="Avatar" class="w-full h-full object-cover" />
                        </div>
                    </div>
                </header>

                <main id="content-area" class="flex-1 overflow-y-auto p-4 space-y-6 pb-6 hide-scrollbar">
                    <!-- Views will be injected here -->
                    <div id="matches-view" class="space-y-4">
                         <div class="flex justify-between items-center mb-4">
                            <h2 class="text-xl font-bold">Fixture</h2>
                            <div class="flex gap-2">
                                <div id="countdown-timer" class="hidden bg-slate-900 border border-slate-700 px-2 py-1 rounded text-[10px] text-brand-500"></div>
                                <a href="/salud/index.html" class="bg-red-600 text-white px-3 py-1 rounded text-xs font-bold">Primeros Auxilios</a>
                            </div>
                         </div>
                         <div id="stage-tabs" class="flex gap-2 overflow-x-auto pb-2"></div>
                         <div id="matches-list" class="space-y-4"></div>
                    </div>

                    <div id="ranking-view" class="hidden space-y-4">
                         <h2 class="text-xl font-bold">Ranking General</h2>
                         <div class="bg-slate-800/50 rounded-2xl overflow-hidden border border-slate-700/50">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-slate-800 text-slate-300">
                                    <tr><th class="px-4 py-3">#</th><th class="px-4 py-3">Jugador</th><th class="px-4 py-3 text-right">Pts</th></tr>
                                </thead>
                                <tbody id="ranking-list" class="divide-y divide-slate-700/50"></tbody>
                            </table>
                         </div>
                    </div>
                </main>
            </div>
            
            <!-- Sidebar Predictions -->
            <aside id="sidebar-predictions" class="w-full md:w-80 lg:w-96 bg-brand-dark/95 backdrop-blur-md md:bg-slate-900/50 h-full flex flex-col border-t md:border-t-0 border-slate-800 hidden md:flex">
                <div class="p-4 border-b border-slate-800"><h2 class="font-bold">Mi Grilla</h2></div>
                <div id="predictions-grid" class="flex-1 overflow-y-auto p-4 space-y-3 pb-24 hide-scrollbar"></div>
            </aside>
        </section>
        
        <!-- Loading Overlay -->
        <div id="global-loader" class="fixed inset-0 bg-brand-dark/90 backdrop-blur-sm z-[100] flex flex-col items-center justify-center hidden">
            <p class="text-brand-500 font-medium animate-pulse">Cargando...</p>
        </div>
    </div>

    <!-- Entry Point -->
    <script type="module" src="./src/js/app.js"></script>
</body>
</html>
